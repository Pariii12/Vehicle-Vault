{% extends 'base.html' %}
{% block content %}

<div class="delete-container">

    <h2 class="delete-title">Delete Vehicle</h2>

    <div class="delete-card">
        <p>Are you sure you want to delete:</p>

        <div class="delete-vehicle-image">
            {% if vehicle.images.all %}
                <img src="{{ vehicle.images.first.image.url }}" alt="Vehicle Image" class="delete-img">
            {% endif %}
        </div>

        <h3 class="delete-vehicle-name">
            {{ vehicle.brand }} {{ vehicle.model }} ({{ vehicle.year }})
        </h3>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="delete-btn">Yes, Delete</button>
            <a href="{% url 'vehicle_detail' vehicle.pk %}" class="cancel-btn">Cancel</a>
        </form>
    </div>

</div>

{% endblock %}
